{% extends "base_marketing.html" %}

{% block title %}Check Your Email{% endblock %}

{% block content %}

    <span class="eyebrow">Reset email sent</span>
    <h1>Check your email.</h1>
    <p class="muted">If an account matches that address, a password reset link is on its way.</p>

      <a class="button button-primary" href="{% url 'account_login' %}">Back to log in</a>
    </div>
  </section>
{% endblock %}
