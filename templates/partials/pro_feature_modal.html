<div
  class="modal-backdrop"
  x-cloak
  x-show="upgradeModalOpen"
  x-transition.opacity
  @click.self="upgradeModalOpen = false"
  @keydown.escape.window="upgradeModalOpen = false"
>
  <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="pro-feature-title">
    <span class="eyebrow">Pro feature</span>
    <h3 id="pro-feature-title" class="text-2xl font-black uppercase text-brand-navy" x-text="upgradeFeature + ' is part of Pro'"></h3>
    <p class="muted mt-3">
      Start Pro now with your first {{ stripe_trial_period_days }} days free. You will pay $0 today, then ${{ stripe_pro_monthly_price }}/month if you keep it.
    </p>
    <div class="button-row mt-6">
      {% if stripe_enabled %}
        <form method="post" action="{% url 'billing:checkout' %}">
          {% csrf_token %}
          <button class="button button-primary" type="submit">Start Pro free for {{ stripe_trial_period_days }} days</button>
        </form>
      {% else %}
        <a class="button button-primary" href="{% url 'accounts:settings' %}">Go to settings</a>
      {% endif %}
      <button class="button button-secondary" type="button" @click="upgradeModalOpen = false">Not now</button>
    </div>
  </div>
</div>
